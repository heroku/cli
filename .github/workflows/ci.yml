name: Tests

on:
  [push, workflow_dispatch]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm
      - run: npm ci
      - name: linting
        run: npm run lint

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        node-version: [20.x, 22.x]
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - name: unit tests
        run: npm test
      - name: Upload coverage reports
        if: always() && (github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref != 'refs/heads/main' && github.ref != 'refs/heads/v11.0.0')) && matrix.os == 'ubuntu-latest' && matrix.node-version == '22.x'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30
      - name: Coverage summary
        if: always() && matrix.os == 'ubuntu-latest' && matrix.node-version == '22.x'
        run: |
          if [ -f coverage/lcov.info ]; then
            echo "## 📊 Coverage Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Coverage |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|----------|" >> $GITHUB_STEP_SUMMARY

            # Parse coverage from lcov.info
            LINES_FOUND=$(grep -o "LF:[0-9]*" coverage/lcov.info | cut -d: -f2 | awk '{s+=$1} END {print s}')
            LINES_HIT=$(grep -o "LH:[0-9]*" coverage/lcov.info | cut -d: -f2 | awk '{s+=$1} END {print s}')
            FUNCS_FOUND=$(grep -o "FNF:[0-9]*" coverage/lcov.info | cut -d: -f2 | awk '{s+=$1} END {print s}')
            FUNCS_HIT=$(grep -o "FNH:[0-9]*" coverage/lcov.info | cut -d: -f2 | awk '{s+=$1} END {print s}')
            BRANCHES_FOUND=$(grep -o "BRF:[0-9]*" coverage/lcov.info | cut -d: -f2 | awk '{s+=$1} END {print s}')
            BRANCHES_HIT=$(grep -o "BRH:[0-9]*" coverage/lcov.info | cut -d: -f2 | awk '{s+=$1} END {print s}')

            LINES_PCT=$(awk "BEGIN {printf \"%.2f\", ($LINES_HIT/$LINES_FOUND)*100}")
            FUNCS_PCT=$(awk "BEGIN {printf \"%.2f\", ($FUNCS_HIT/$FUNCS_FOUND)*100}")
            BRANCHES_PCT=$(awk "BEGIN {printf \"%.2f\", ($BRANCHES_HIT/$BRANCHES_FOUND)*100}")

            echo "| Lines | ${LINES_PCT}% (${LINES_HIT}/${LINES_FOUND}) |" >> $GITHUB_STEP_SUMMARY
            echo "| Functions | ${FUNCS_PCT}% (${FUNCS_HIT}/${FUNCS_FOUND}) |" >> $GITHUB_STEP_SUMMARY
            echo "| Branches | ${BRANCHES_PCT}% (${BRANCHES_HIT}/${BRANCHES_FOUND}) |" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Coverage report not found" >> $GITHUB_STEP_SUMMARY
          fi

  base-coverage:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref != 'refs/heads/main' && github.ref != 'refs/heads/v11.0.0')
    steps:
      - uses: actions/checkout@v6
      - name: Get PR base branch
        id: pr-info
        uses: actions/github-script@v7
        with:
          script: |
            let baseBranch = 'main'; // default

            if (context.eventName === 'pull_request') {
              baseBranch = context.payload.pull_request.base.ref;
            } else if (context.eventName === 'push') {
              // Look up PR by branch name
              const branch = context.ref.replace('refs/heads/', '');
              const { data: pulls } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                head: `${context.repo.owner}:${branch}`
              });

              if (pulls.length > 0) {
                baseBranch = pulls[0].base.ref;
              }
            }

            core.setOutput('base_ref', baseBranch);
            console.log(`Base branch: ${baseBranch}`);
      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.pr-info.outputs.base_ref }}
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm
      - run: npm ci
      - name: Run tests on base branch
        run: npm run test:unit:justTest:ci
      - name: Upload base coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-base
          path: coverage/
          retention-days: 1

  coverage-comment:
    runs-on: ubuntu-latest
    needs: [test, base-coverage]
    if: (github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref != 'refs/heads/main' && github.ref != 'refs/heads/v11.0.0')) && needs.test.result == 'success' && needs.base-coverage.result == 'success'
    steps:
      - uses: actions/checkout@v6
      - name: Get PR number
        id: pr-number
        uses: actions/github-script@v7
        with:
          script: |
            let prNumber = null;

            if (context.eventName === 'pull_request') {
              prNumber = context.payload.pull_request.number;
            } else if (context.eventName === 'push') {
              // Look up PR by branch name
              const branch = context.ref.replace('refs/heads/', '');
              const { data: pulls } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                head: `${context.repo.owner}:${branch}`
              });

              if (pulls.length > 0) {
                prNumber = pulls[0].number;
              }
            }

            if (!prNumber) {
              core.setFailed('Could not determine PR number');
              return;
            }

            core.setOutput('number', prNumber);
            console.log(`PR number: ${prNumber}`);
      - name: Get PR base branch
        id: pr-info
        uses: actions/github-script@v7
        with:
          script: |
            let baseBranch = 'main'; // default

            if (context.eventName === 'pull_request') {
              baseBranch = context.payload.pull_request.base.ref;
            } else if (context.eventName === 'push') {
              // Look up PR by branch name
              const branch = context.ref.replace('refs/heads/', '');
              const { data: pulls } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                head: `${context.repo.owner}:${branch}`
              });

              if (pulls.length > 0) {
                baseBranch = pulls[0].base.ref;
              }
            }

            core.setOutput('base_ref', baseBranch);
            console.log(`Base branch: ${baseBranch}`);
      - name: Download PR coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage-pr/
      - name: Download base coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-base
          path: coverage-base/
      - name: Generate comparison and comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Parse PR coverage
          LINES_FOUND=$(grep -o "LF:[0-9]*" coverage-pr/lcov.info | cut -d: -f2 | awk '{s+=$1} END {print s}')
          LINES_HIT=$(grep -o "LH:[0-9]*" coverage-pr/lcov.info | cut -d: -f2 | awk '{s+=$1} END {print s}')
          FUNCS_FOUND=$(grep -o "FNF:[0-9]*" coverage-pr/lcov.info | cut -d: -f2 | awk '{s+=$1} END {print s}')
          FUNCS_HIT=$(grep -o "FNH:[0-9]*" coverage-pr/lcov.info | cut -d: -f2 | awk '{s+=$1} END {print s}')
          BRANCHES_FOUND=$(grep -o "BRF:[0-9]*" coverage-pr/lcov.info | cut -d: -f2 | awk '{s+=$1} END {print s}')
          BRANCHES_HIT=$(grep -o "BRH:[0-9]*" coverage-pr/lcov.info | cut -d: -f2 | awk '{s+=$1} END {print s}')

          LINES_PCT=$(awk "BEGIN {printf \"%.2f\", ($LINES_HIT/$LINES_FOUND)*100}")
          FUNCS_PCT=$(awk "BEGIN {printf \"%.2f\", ($FUNCS_HIT/$FUNCS_FOUND)*100}")
          BRANCHES_PCT=$(awk "BEGIN {printf \"%.2f\", ($BRANCHES_HIT/$BRANCHES_FOUND)*100}")

          # Parse base coverage
          BASE_LINES_FOUND=$(grep -o "LF:[0-9]*" coverage-base/lcov.info | cut -d: -f2 | awk '{s+=$1} END {print s}')
          BASE_LINES_HIT=$(grep -o "LH:[0-9]*" coverage-base/lcov.info | cut -d: -f2 | awk '{s+=$1} END {print s}')
          BASE_FUNCS_FOUND=$(grep -o "FNF:[0-9]*" coverage-base/lcov.info | cut -d: -f2 | awk '{s+=$1} END {print s}')
          BASE_FUNCS_HIT=$(grep -o "FNH:[0-9]*" coverage-base/lcov.info | cut -d: -f2 | awk '{s+=$1} END {print s}')
          BASE_BRANCHES_FOUND=$(grep -o "BRF:[0-9]*" coverage-base/lcov.info | cut -d: -f2 | awk '{s+=$1} END {print s}')
          BASE_BRANCHES_HIT=$(grep -o "BRH:[0-9]*" coverage-base/lcov.info | cut -d: -f2 | awk '{s+=$1} END {print s}')

          BASE_LINES_PCT=$(awk "BEGIN {printf \"%.2f\", ($BASE_LINES_HIT/$BASE_LINES_FOUND)*100}")
          BASE_FUNCS_PCT=$(awk "BEGIN {printf \"%.2f\", ($BASE_FUNCS_HIT/$BASE_FUNCS_FOUND)*100}")
          BASE_BRANCHES_PCT=$(awk "BEGIN {printf \"%.2f\", ($BASE_BRANCHES_HIT/$BASE_BRANCHES_FOUND)*100}")

          LINES_DIFF=$(awk "BEGIN {printf \"%.2f\", $LINES_PCT - $BASE_LINES_PCT}")
          FUNCS_DIFF=$(awk "BEGIN {printf \"%.2f\", $FUNCS_PCT - $BASE_FUNCS_PCT}")
          BRANCHES_DIFF=$(awk "BEGIN {printf \"%.2f\", $BRANCHES_PCT - $BASE_BRANCHES_PCT}")

          # Add emoji indicators
          LINES_INDICATOR=$(awk "BEGIN {if ($LINES_DIFF > 0) print \"🟢 +\"; else if ($LINES_DIFF < 0) print \"🔴 \"; else print \"\"}")
          FUNCS_INDICATOR=$(awk "BEGIN {if ($FUNCS_DIFF > 0) print \"🟢 +\"; else if ($FUNCS_DIFF < 0) print \"🔴 \"; else print \"\"}")
          BRANCHES_INDICATOR=$(awk "BEGIN {if ($BRANCHES_DIFF > 0) print \"🟢 +\"; else if ($BRANCHES_DIFF < 0) print \"🔴 \"; else print \"\"}")

          # Create comment body
          COMMENT_BODY="## 📊 Coverage Report

          | Metric | Coverage |
          |--------|----------|
          | Lines | ${LINES_PCT}% (${LINES_HIT}/${LINES_FOUND}) |
          | Functions | ${FUNCS_PCT}% (${FUNCS_HIT}/${FUNCS_FOUND}) |
          | Branches | ${BRANCHES_PCT}% (${BRANCHES_HIT}/${BRANCHES_FOUND}) |

          ### Compared to base branch (\`${{ steps.pr-info.outputs.base_ref }}\`)

          | Metric | Base | Current | Change |
          |--------|------|---------|--------|
          | Lines | ${BASE_LINES_PCT}% | ${LINES_PCT}% | ${LINES_INDICATOR}${LINES_DIFF}% |
          | Functions | ${BASE_FUNCS_PCT}% | ${FUNCS_PCT}% | ${FUNCS_INDICATOR}${FUNCS_DIFF}% |
          | Branches | ${BASE_BRANCHES_PCT}% | ${BRANCHES_PCT}% | ${BRANCHES_INDICATOR}${BRANCHES_DIFF}% |

          <details>
          <summary>View full coverage report</summary>

          Download the coverage artifact from this workflow run to see the full HTML report.
          </details>"

          # Delete old coverage comments
          gh pr view ${{ steps.pr-number.outputs.number }} --json comments --jq '.comments[] | select(.body | startswith("## 📊 Coverage Report")) | .id' | \
            xargs -I {} gh api -X DELETE /repos/${{ github.repository }}/issues/comments/{} || true

          # Post new comment
          gh pr comment ${{ steps.pr-number.outputs.number }} --body "$COMMENT_BODY"

  integration:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        node-version: [20.x, 22.x]
        os: [ubuntu-latest]
    environment: AcceptanceTests
    env:
      HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
      ENABLE_NET_CONNECT: true
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - name: Run cli package integration tests
        run: npm run test:integration

  acceptance:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        node-version: [20.x, 22.x]
        os: [ubuntu-latest]
    environment: AcceptanceTests
    env:
      HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
      ENABLE_NET_CONNECT: true
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
        # on 'main' and 'release-' branches, these tests will be run as part of the acceptance tests.
      - name: run smoke tests
        if: github.ref_name != 'main' || !startsWith(github.ref_name, 'release-')
        run: npm run test:smoke
        # only run the full suite of acceptance tests on 'main' and 'release-' branches
      - name: run acceptance tests
        if: github.ref_name == 'main' || startsWith(github.ref_name, 'release-')
        run: npm run test:acceptance

  spell-check:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        node-version: [22.x]
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v6
        with: 
          fetch-depth: 0
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm install cspell@9.2.1
      - name: Run spell check on changed files
        run: |
          git fetch origin main:refs/remotes/origin/main --quiet
          git diff origin/main...HEAD --diff-filter=d --name-only | npm run cspell:ci

  # dummy job needed to pass changeling compliance because it only watches one build
  done:
    runs-on: macos-latest
    needs: [lint, test, integration, acceptance]
    steps:
      - run: echo done
        working-directory: /
