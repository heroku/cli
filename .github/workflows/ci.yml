name: Tests

on:
  push:
    # Only run on pushes to main branches and long-lived feature branches
    # PRs will trigger via pull_request event to avoid duplicate runs
    branches:
      - main
      - v11.0.0
      # Add any long-lived feature branches here
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm
      - run: npm ci
      - name: linting
        run: npm run lint

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        node-version: [20.x, 22.x]
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - name: unit tests
        run: npm test
      - name: Upload coverage reports
        if: always() && github.event_name == 'pull_request' && matrix.os == 'ubuntu-latest' && matrix.node-version == '22.x'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30
      - name: Coverage summary
        if: always() && matrix.os == 'ubuntu-latest' && matrix.node-version == '22.x'
        run: |
          if [ -f coverage/lcov.info ]; then
            echo "## 📊 Coverage Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Coverage |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|----------|" >> $GITHUB_STEP_SUMMARY

            # Parse coverage from lcov.info
            LINES_FOUND=$(grep -o "LF:[0-9]*" coverage/lcov.info | cut -d: -f2 | awk '{s+=$1} END {print s}')
            LINES_HIT=$(grep -o "LH:[0-9]*" coverage/lcov.info | cut -d: -f2 | awk '{s+=$1} END {print s}')
            FUNCS_FOUND=$(grep -o "FNF:[0-9]*" coverage/lcov.info | cut -d: -f2 | awk '{s+=$1} END {print s}')
            FUNCS_HIT=$(grep -o "FNH:[0-9]*" coverage/lcov.info | cut -d: -f2 | awk '{s+=$1} END {print s}')
            BRANCHES_FOUND=$(grep -o "BRF:[0-9]*" coverage/lcov.info | cut -d: -f2 | awk '{s+=$1} END {print s}')
            BRANCHES_HIT=$(grep -o "BRH:[0-9]*" coverage/lcov.info | cut -d: -f2 | awk '{s+=$1} END {print s}')

            LINES_PCT=$(awk "BEGIN {printf \"%.2f\", ($LINES_HIT/$LINES_FOUND)*100}")
            FUNCS_PCT=$(awk "BEGIN {printf \"%.2f\", ($FUNCS_HIT/$FUNCS_FOUND)*100}")
            BRANCHES_PCT=$(awk "BEGIN {printf \"%.2f\", ($BRANCHES_HIT/$BRANCHES_FOUND)*100}")

            echo "| Lines | ${LINES_PCT}% (${LINES_HIT}/${LINES_FOUND}) |" >> $GITHUB_STEP_SUMMARY
            echo "| Functions | ${FUNCS_PCT}% (${FUNCS_HIT}/${FUNCS_FOUND}) |" >> $GITHUB_STEP_SUMMARY
            echo "| Branches | ${BRANCHES_PCT}% (${BRANCHES_HIT}/${BRANCHES_FOUND}) |" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Coverage report not found" >> $GITHUB_STEP_SUMMARY
          fi

  base-coverage:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.ref }}
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm
      - run: npm ci
      - name: Run tests on base branch
        run: npm run test:unit:justTest:ci
      - name: Upload base coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-base
          path: coverage/
          retention-days: 1

  coverage-check:
    runs-on: ubuntu-latest
    needs: [test, base-coverage]
    if: github.event_name == 'pull_request' && needs.test.result == 'success' && needs.base-coverage.result == 'success'
    steps:
      - uses: actions/checkout@v6
      - name: Download PR coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage-pr/
      - name: Download base coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-base
          path: coverage-base/
      - name: Compare coverage and fail if decreased
        run: |
          # Parse PR coverage
          LINES_FOUND=$(grep -o "LF:[0-9]*" coverage-pr/lcov.info | cut -d: -f2 | awk '{s+=$1} END {print s}')
          LINES_HIT=$(grep -o "LH:[0-9]*" coverage-pr/lcov.info | cut -d: -f2 | awk '{s+=$1} END {print s}')
          FUNCS_FOUND=$(grep -o "FNF:[0-9]*" coverage-pr/lcov.info | cut -d: -f2 | awk '{s+=$1} END {print s}')
          FUNCS_HIT=$(grep -o "FNH:[0-9]*" coverage-pr/lcov.info | cut -d: -f2 | awk '{s+=$1} END {print s}')
          BRANCHES_FOUND=$(grep -o "BRF:[0-9]*" coverage-pr/lcov.info | cut -d: -f2 | awk '{s+=$1} END {print s}')
          BRANCHES_HIT=$(grep -o "BRH:[0-9]*" coverage-pr/lcov.info | cut -d: -f2 | awk '{s+=$1} END {print s}')

          LINES_PCT=$(awk "BEGIN {printf \"%.2f\", ($LINES_HIT/$LINES_FOUND)*100}")
          FUNCS_PCT=$(awk "BEGIN {printf \"%.2f\", ($FUNCS_HIT/$FUNCS_FOUND)*100}")
          BRANCHES_PCT=$(awk "BEGIN {printf \"%.2f\", ($BRANCHES_HIT/$BRANCHES_FOUND)*100}")

          # Parse base coverage (may be empty if base branch doesn't have c8 configured)
          BASE_LINES_FOUND=$(grep -o "LF:[0-9]*" coverage-base/lcov.info 2>/dev/null | cut -d: -f2 | awk '{s+=$1} END {print s}')
          BASE_LINES_HIT=$(grep -o "LH:[0-9]*" coverage-base/lcov.info 2>/dev/null | cut -d: -f2 | awk '{s+=$1} END {print s}')
          BASE_FUNCS_FOUND=$(grep -o "FNF:[0-9]*" coverage-base/lcov.info 2>/dev/null | cut -d: -f2 | awk '{s+=$1} END {print s}')
          BASE_FUNCS_HIT=$(grep -o "FNH:[0-9]*" coverage-base/lcov.info 2>/dev/null | cut -d: -f2 | awk '{s+=$1} END {print s}')
          BASE_BRANCHES_FOUND=$(grep -o "BRF:[0-9]*" coverage-base/lcov.info 2>/dev/null | cut -d: -f2 | awk '{s+=$1} END {print s}')
          BASE_BRANCHES_HIT=$(grep -o "BRH:[0-9]*" coverage-base/lcov.info 2>/dev/null | cut -d: -f2 | awk '{s+=$1} END {print s}')

          # Default to 0 if empty
          BASE_LINES_FOUND=${BASE_LINES_FOUND:-0}
          BASE_LINES_HIT=${BASE_LINES_HIT:-0}
          BASE_FUNCS_FOUND=${BASE_FUNCS_FOUND:-0}
          BASE_FUNCS_HIT=${BASE_FUNCS_HIT:-0}
          BASE_BRANCHES_FOUND=${BASE_BRANCHES_FOUND:-0}
          BASE_BRANCHES_HIT=${BASE_BRANCHES_HIT:-0}

          echo "## 📊 Coverage Comparison" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Current Coverage (PR)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Coverage |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lines | ${LINES_PCT}% (${LINES_HIT}/${LINES_FOUND}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Functions | ${FUNCS_PCT}% (${FUNCS_HIT}/${FUNCS_FOUND}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Branches | ${BRANCHES_PCT}% (${BRANCHES_HIT}/${BRANCHES_FOUND}) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check if base coverage exists
          if [ "$BASE_LINES_FOUND" -eq 0 ]; then
            echo "_Note: Base branch (\`${{ github.event.pull_request.base.ref }}\`) does not have coverage reporting configured yet._" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ Coverage check passed (no baseline to compare)" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          # Calculate base coverage percentages
          BASE_LINES_PCT=$(awk "BEGIN {printf \"%.2f\", ($BASE_LINES_HIT/$BASE_LINES_FOUND)*100}")
          BASE_FUNCS_PCT=$(awk "BEGIN {printf \"%.2f\", ($BASE_FUNCS_HIT/$BASE_FUNCS_FOUND)*100}")
          BASE_BRANCHES_PCT=$(awk "BEGIN {printf \"%.2f\", ($BASE_BRANCHES_HIT/$BASE_BRANCHES_FOUND)*100}")

          # Calculate diffs
          LINES_DIFF=$(awk "BEGIN {printf \"%.2f\", $LINES_PCT - $BASE_LINES_PCT}")
          FUNCS_DIFF=$(awk "BEGIN {printf \"%.2f\", $FUNCS_PCT - $BASE_FUNCS_PCT}")
          BRANCHES_DIFF=$(awk "BEGIN {printf \"%.2f\", $BRANCHES_PCT - $BASE_BRANCHES_PCT}")

          # Add indicators
          LINES_INDICATOR=$(awk "BEGIN {if ($LINES_DIFF > 0) print \"🟢\"; else if ($LINES_DIFF < 0) print \"🔴\"; else print \"⚪\"}")
          FUNCS_INDICATOR=$(awk "BEGIN {if ($FUNCS_DIFF > 0) print \"🟢\"; else if ($FUNCS_DIFF < 0) print \"🔴\"; else print \"⚪\"}")
          BRANCHES_INDICATOR=$(awk "BEGIN {if ($BRANCHES_DIFF > 0) print \"🟢\"; else if ($BRANCHES_DIFF < 0) print \"🔴\"; else print \"⚪\"}")

          echo "### Compared to base branch (\`${{ github.event.pull_request.base.ref }}\`)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Base | Current | Change |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lines | ${BASE_LINES_PCT}% | ${LINES_PCT}% | ${LINES_INDICATOR} ${LINES_DIFF}% |" >> $GITHUB_STEP_SUMMARY
          echo "| Functions | ${BASE_FUNCS_PCT}% | ${FUNCS_PCT}% | ${FUNCS_INDICATOR} ${FUNCS_DIFF}% |" >> $GITHUB_STEP_SUMMARY
          echo "| Branches | ${BASE_BRANCHES_PCT}% | ${BRANCHES_PCT}% | ${BRANCHES_INDICATOR} ${BRANCHES_DIFF}% |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check if coverage decreased
          COVERAGE_DECREASED=false
          if (( $(awk "BEGIN {print ($LINES_DIFF < 0)}") )); then
            echo "⚠️ Lines coverage decreased by ${LINES_DIFF}%" >> $GITHUB_STEP_SUMMARY
            COVERAGE_DECREASED=true
          fi
          if (( $(awk "BEGIN {print ($FUNCS_DIFF < 0)}") )); then
            echo "⚠️ Functions coverage decreased by ${FUNCS_DIFF}%" >> $GITHUB_STEP_SUMMARY
            COVERAGE_DECREASED=true
          fi
          if (( $(awk "BEGIN {print ($BRANCHES_DIFF < 0)}") )); then
            echo "⚠️ Branches coverage decreased by ${BRANCHES_DIFF}%" >> $GITHUB_STEP_SUMMARY
            COVERAGE_DECREASED=true
          fi

          # Check if all coverage metrics are >= 90%
          ALL_ABOVE_90=$(awk "BEGIN {print ($LINES_PCT >= 90 && $FUNCS_PCT >= 90 && $BRANCHES_PCT >= 90)}")

          if [ "$COVERAGE_DECREASED" = true ]; then
            if [ "$ALL_ABOVE_90" -eq 1 ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "✅ Coverage check passed - all metrics are >= 90%" >> $GITHUB_STEP_SUMMARY
              exit 0
            else
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "❌ **Coverage has decreased compared to the base branch. Please add tests to maintain or improve coverage.**" >> $GITHUB_STEP_SUMMARY
              exit 1
            fi
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ Coverage check passed - no decrease detected" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

  integration:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        node-version: [20.x, 22.x]
        os: [ubuntu-latest]
    environment: AcceptanceTests
    env:
      HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
      ENABLE_NET_CONNECT: true
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - name: Run cli package integration tests
        run: npm run test:integration

  acceptance:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        node-version: [20.x, 22.x]
        os: [ubuntu-latest]
    environment: AcceptanceTests
    env:
      HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
      ENABLE_NET_CONNECT: true
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
        # on 'main' and 'release-' branches, these tests will be run as part of the acceptance tests.
      - name: run smoke tests
        if: github.ref_name != 'main' || !startsWith(github.ref_name, 'release-')
        run: npm run test:smoke
        # only run the full suite of acceptance tests on 'main' and 'release-' branches
      - name: run acceptance tests
        if: github.ref_name == 'main' || startsWith(github.ref_name, 'release-')
        run: npm run test:acceptance

  spell-check:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        node-version: [22.x]
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v6
        with: 
          fetch-depth: 0
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm install cspell@9.2.1
      - name: Run spell check on changed files
        run: |
          git fetch origin main:refs/remotes/origin/main --quiet
          git diff origin/main...HEAD --diff-filter=d --name-only | npm run cspell:ci

  # dummy job needed to pass changeling compliance because it only watches one build
  done:
    runs-on: macos-latest
    needs: [lint, test, integration, acceptance]
    steps:
      - run: echo done
        working-directory: /
